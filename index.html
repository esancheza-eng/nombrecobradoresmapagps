<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTROL DE COBRADORES</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:40px;
background:#f5f5f5;
}

h2{
color:#333;
}

button{
font-size:18px;
padding:14px 22px;
margin:10px;
cursor:pointer;
border:none;
background:#1e73be;
color:white;
border-radius:6px;
}

button:hover{
background:#145a96;
}

select{
font-size:18px;
padding:10px;
}

#estado{
margin-top:20px;
font-size:16px;
color:#333;
}

</style>

</head>

<body>

<h2>CONTROL DE COBRADORES</h2>

<select id="nombre">

<option value="" selected disabled>Seleccione cobrador</option>

<option>JEFFERSON QUIÑONEZ</option>
<option>FAUSTO VILLARREAL</option>
<option>MARIO CHAVEZ</option>
<option>VICTOR MENDOZA</option>
<option>GUILLERMO MONTAÑO</option>
<option>RAFAEL MILLAN</option>
<option>JOSE OLAYA</option>
<option>GABRIEL MORAN</option>
<option>BYRON AGUILAR</option>
<option>CELIO ORTEGA</option>
<option>FRANKLIN CARRANZA</option>
<option>HECTOR MOSQUERA</option>
<option>JULIO JARA</option>
<option>ADOLFO GONZALEZ</option>

</select>

<br><br>

<button onclick="iniciar()">INICIAR GPS</button>

<button onclick="inicioAlmuerzo()">INICIO ALMUERZO</button>

<button onclick="finAlmuerzo()">FIN ALMUERZO</button>

<button onclick="finalizar()">FINALIZAR GPS</button>

<div id="estado"></div>

<script>

/* CONFIGURACIÓN FIREBASE */

var firebaseConfig = {

apiKey: "AIzaSyCW__ndth0b9jYO91QF8x6Psp7-lK1-lW4",
authDomain: "gps-cobradores.firebaseapp.com",
databaseURL: "https://gps-cobradores-default-rtdb.firebaseio.com",
projectId: "gps-cobradores"

};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

var watchID = null;

/* INICIAR GPS */

function iniciar(){

var nombre=document.getElementById("nombre").value;

if(!nombre){

alert("Seleccione su nombre");
return;

}

var horaInicio=new Date().toLocaleTimeString();

watchID=navigator.geolocation.watchPosition(function(pos){

var lat=pos.coords.latitude;
var lon=pos.coords.longitude;

db.ref("cobradores/"+nombre).update({

latitud:lat,
longitud:lon,
estado:"trabajando",
hora_inicio:horaInicio,
hora:new Date().toLocaleTimeString()

});

document.getElementById("estado").innerHTML="GPS activo";

});

alert("JORNADA INICIADA");

}

/* INICIO ALMUERZO */

function inicioAlmuerzo(){

var nombre=document.getElementById("nombre").value;

if(!nombre){

alert("Seleccione su nombre");
return;

}

var horaAlmuerzo=new Date().toLocaleTimeString();

db.ref("cobradores/"+nombre).update({

estado:"almuerzo",
hora_inicio_almuerzo:horaAlmuerzo

});

alert("INICIO ALMUERZO REGISTRADO");

}

/* FIN ALMUERZO */

function finAlmuerzo(){

var nombre=document.getElementById("nombre").value;

if(!nombre){

alert("Seleccione su nombre");
return;

}

var horaFinAlmuerzo=new Date().toLocaleTimeString();

db.ref("cobradores/"+nombre).update({

estado:"trabajando",
hora_fin_almuerzo:horaFinAlmuerzo

});

alert("FIN ALMUERZO REGISTRADO");

}

/* FINALIZAR GPS */

function finalizar(){

var nombre=document.getElementById("nombre").value;

if(!nombre){

alert("Seleccione su nombre");
return;

}

navigator.geolocation.getCurrentPosition(function(pos){

var lat=pos.coords.latitude;
var lon=pos.coords.longitude;

var horaFin=new Date().toLocaleTimeString();

db.ref("cobradores/"+nombre).update({

latitud:lat,
longitud:lon,
estado:"finalizado",
hora_fin_ruta:horaFin

});

if(watchID!==null){

navigator.geolocation.clearWatch(watchID);

}

document.getElementById("estado").innerHTML="Jornada finalizada";

alert("JORNADA FINALIZADA");

});

}

</script>

</body>
</html>
