<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTROL DE COBRADORES</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:40px;
background:#f5f5f5;
}

h2{
color:#333;
}

button{
font-size:18px;
padding:14px 22px;
margin:10px;
cursor:pointer;
border:none;
background:#1e73be;
color:white;
border-radius:6px;
}

button:hover{
background:#145a96;
}

select{
font-size:18px;
padding:10px;
}

#estado{
margin-top:20px;
font-size:16px;
color:#333;
}

</style>

</head>

<body>

<h2>CONTROL DE COBRADORES</h2>

<select id="nombre">

<option value="" selected disabled>Seleccione cobrador</option>

<option>JEFFERSON QUIÑONEZ</option>
<option>FAUSTO VILLARREAL</option>
<option>MARIO CHAVEZ</option>
<option>VICTOR MENDOZA</option>
<option>GUILLERMO MONTAÑO</option>
<option>RAFAEL MILLAN</option>
<option>JOSE OLAYA</option>
<option>GABRIEL MORAN</option>
<option>BYRON AGUILAR</option>
<option>CELIO ORTEGA</option>
<option>FRANKLIN CARRANZA</option>
<option>HECTOR MOSQUERA</option>
<option>JULIO JARA</option>
<option>ADOLFO GONZALEZ</option>

</select>

<br><br>

<button onclick="iniciar()">INICIAR GPS</button>

<button onclick="inicioAlmuerzo()">INICIO ALMUERZO</button>

<button onclick="finAlmuerzo()">FIN ALMUERZO</button>

<button onclick="finalizar()">FINALIZAR GPS</button>

<div id="estado"></div>

<script>

var firebaseConfig = {

apiKey: "AIzaSyCW__ndth0b9jYO91QF8x6Psp7-lK1-lW4",
authDomain: "gps-cobradores.firebaseapp.com",
databaseURL: "https://gps-cobradores-default-rtdb.firebaseio.com",
projectId: "gps-cobradores"

};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

var watchID = null;

function iniciar(){

var nombre = document.getElementById("nombre").value;

if(!nombre){

alert("Seleccione su nombre");

return;

}

if(!navigator.geolocation){

alert("GPS no disponible");

return;

}

watchID = navigator.geolocation.watchPosition(

function(pos){

var lat = pos.coords.latitude;
var lon = pos.coords.longitude;

db.ref("cobradores/"+nombre).set({

latitud: lat,
longitud: lon,
estado: "trabajando",
hora: new Date().toLocaleTimeString(),
ultima_actualizacion: Date.now()

});

document.getElementById("estado").innerHTML = "GPS activo enviando ubicación";

},

function(error){

alert("No se pudo obtener GPS");

},

{

enableHighAccuracy:true,
maximumAge:10000,
timeout:5000

}

);

alert("GPS ACTIVADO");

}

function inicioAlmuerzo(){

var nombre = document.getElementById("nombre").value;

if(!nombre){

alert("Seleccione su nombre");

return;

}

db.ref("cobradores/"+nombre+"/estado").set("almuerzo");

db.ref("cobradores/"+nombre+"/hora_almuerzo_inicio").set(new Date().toLocaleTimeString());

alert("INICIO DE ALMUERZO REGISTRADO");

}

function finAlmuerzo(){

var nombre = document.getElementById("nombre").value;

if(!nombre){

alert("Seleccione su nombre");

return;

}

db.ref("cobradores/"+nombre+"/estado").set("trabajando");

db.ref("cobradores/"+nombre+"/hora_almuerzo_fin").set(new Date().toLocaleTimeString());

alert("FIN DE ALMUERZO REGISTRADO");

}

function finalizar(){

var nombre = document.getElementById("nombre").value;

if(!nombre){

alert("Seleccione su nombre");

return;

}

navigator.geolocation.getCurrentPosition(function(pos){

var lat = pos.coords.latitude;
var lon = pos.coords.longitude;

db.ref("cobradores/"+nombre).set({

latitud: lat,
longitud: lon,
estado: "finalizado",
hora: new Date().toLocaleTimeString(),
hora_fin: new Date().toLocaleTimeString(),
ultima_actualizacion: Date.now()

});

if(watchID !== null){

navigator.geolocation.clearWatch(watchID);

}

document.getElementById("estado").innerHTML = "Jornada finalizada";

alert("JORNADA FINALIZADA");

});

}

</script>

</body>
</html>
