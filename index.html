<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>MAPA COBRADORES</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

var firebaseConfig = {
apiKey: "AIzaSyCW__ndth0b9jYO91QF8x6Psp7-lK1-lW4",
authDomain: "gps-cobradores.firebaseapp.com",
databaseURL: "https://gps-cobradores-default-rtdb.firebaseio.com",
projectId: "gps-cobradores"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

var map = L.map('map').setView([-2.134,-79.594],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var marcadores = {};

db.ref("cobradores").on("value",function(snapshot){

var datos = snapshot.val();

for(var nombre in datos){

var lat = datos[nombre].latitud;
var lon = datos[nombre].longitud;

if(marcadores[nombre]){

marcadores[nombre].setLatLng([lat,lon]);

}else{

marcadores[nombre] = L.marker([lat,lon])
.addTo(map)
.bindPopup(nombre);

}

}

});

</script>

</body>
</html>
