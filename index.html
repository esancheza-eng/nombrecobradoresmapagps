<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONTROL DE COBRADORES</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:40px;
background:#f5f5f5;
}

button{
font-size:18px;
padding:14px 22px;
margin:10px;
cursor:pointer;
border:none;
background:#1e73be;
color:white;
border-radius:6px;
}

select{
font-size:18px;
padding:10px;
}

</style>

</head>

<body>

<h2>CONTROL DE COBRADORES</h2>

<select id="nombre">

<option value="" selected disabled>Seleccione cobrador</option>

<option>JEFFERSON QUIÑONEZ</option>
<option>FAUSTO VILLARREAL</option>
<option>MARIO CHAVEZ</option>
<option>VICTOR MENDOZA</option>
<option>GUILLERMO MONTAÑO</option>
<option>RAFAEL MILLAN</option>
<option>JOSE OLAYA</option>
<option>GABRIEL MORAN</option>
<option>BYRON AGUILAR</option>
<option>CELIO ORTEGA</option>
<option>FRANKLIN CARRANZA</option>
<option>HECTOR MOSQUERA</option>
<option>JULIO JARA</option>
<option>ADOLFO GONZALEZ</option>

</select>

<br><br>

<button onclick="iniciar()">INICIAR GPS</button>
<button onclick="inicioAlmuerzo()">INICIO ALMUERZO</button>
<button onclick="finAlmuerzo()">FIN ALMUERZO</button>
<button onclick="finalizar()">FINALIZAR GPS</button>

<script>

var firebaseConfig = {

apiKey: "AIzaSyCW__ndth0b9jYO91QF8x6Psp7-lK1-lW4",
authDomain: "gps-cobradores.firebaseapp.com",
databaseURL: "https://gps-cobradores-default-rtdb.firebaseio.com",
projectId: "gps-cobradores"

};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

var intervaloGPS=null;

/* INICIAR GPS */

function iniciar(){

var nombre=document.getElementById("nombre").value;

if(!nombre){

alert("Seleccione su nombre");
return;

}

var horaInicio=new Date().toLocaleTimeString();

intervaloGPS=setInterval(function(){

navigator.geolocation.getCurrentPosition(function(pos){

var lat=pos.coords.latitude;
var lon=pos.coords.longitude;

var fecha=new Date().toISOString().split('T')[0];

db.ref("cobradores/"+nombre).update({

latitud:lat,
longitud:lon,
estado:"trabajando",
hora_inicio:horaInicio,
ultima_actualizacion:Date.now()

});

/* GUARDAR RUTA */

db.ref("rutas/"+nombre+"/"+fecha).push({

latitud:lat,
longitud:lon,
hora:new Date().toLocaleTimeString(),
timestamp:Date.now()

});

});

},10000); /* CADA 10 SEGUNDOS */

alert("GPS ACTIVADO");

}

/* INICIO ALMUERZO */

function inicioAlmuerzo(){

var nombre=document.getElementById("nombre").value;

var hora=new Date().toLocaleTimeString();

db.ref("cobradores/"+nombre).update({

estado:"almuerzo",
hora_inicio_almuerzo:hora

});

}

/* FIN ALMUERZO */

function finAlmuerzo(){

var nombre=document.getElementById("nombre").value;

var hora=new Date().toLocaleTimeString();

db.ref("cobradores/"+nombre).update({

estado:"trabajando",
hora_fin_almuerzo:hora

});

}

/* FINALIZAR */

function finalizar(){

var nombre=document.getElementById("nombre").value;

clearInterval(intervaloGPS);

navigator.geolocation.getCurrentPosition(function(pos){

var lat=pos.coords.latitude;
var lon=pos.coords.longitude;

var hora=new Date().toLocaleTimeString();

db.ref("cobradores/"+nombre).update({

latitud:lat,
longitud:lon,
estado:"finalizado",
hora_fin_ruta:hora,
ultima_actualizacion:Date.now()

});

});

alert("JORNADA FINALIZADA");

}

</script>

</body>

</html>
